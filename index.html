<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>定期復習アプリ</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="calendar">
  <div id="calendar-header">
    <button id="prevMonthBtn" aria-label="前の月へ">&larr;</button>
    <h2 id="calendarTitle"></h2>
    <button id="nextMonthBtn" aria-label="次の月へ">&rarr;</button>
  </div>
  <div id="calendarBody"></div>
  <p>セルをクリックすると復習記録が残れるよ！（背景色が変化）</p>
</div>

<div id="notes">
  <form id="addNoteForm">
    <input type="text" id="noteInput" placeholder="復習したい内容を入力（例：教科・概念・文法・公式・etc）" required />
    <button type="submit">追加</button>
  </form>
  <div id="noteList"></div>
</div>

<script src="script.js"></script>
</body>
</html>
